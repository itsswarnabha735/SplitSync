# Firebase App Hosting configuration.
# https://firebase.google.com/docs/app-hosting/configure
#
# The NEXT_PUBLIC_FIREBASE_* values are safe to expose to the browser (they are
# client config, not secrets). Set them per backend in the Firebase console or
# via `firebase apphosting:secrets`, or inline non-sensitive values here.

runConfig:
  # Scale to zero when idle; raise for production traffic.
  minInstances: 0
  maxInstances: 2

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: ""
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: ""
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: ""
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: ""
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: ""
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: ""
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_VAPID_KEY
    value: ""
    availability:
      - BUILD
      - RUNTIME
  - variable: GOOGLE_GEMINI_API_KEY
    secret: google-gemini-api-key
    availability:
      - RUNTIME
